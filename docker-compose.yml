version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mestria-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mestria
      POSTGRES_DB: mestria
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mestria-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:20
    container_name: mestria-api
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mestria-network
    volumes:
      - .:/app
    command: "npm run dev:backend"

  frontend:
    image: node:20
    container_name: mestria-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3000/api"
    depends_on:
      - api
    networks:
      - mestria-network
    volumes:
      - .:/app
    command: "npm run dev:frontend -- --host"

  ollama:
    image: ollama/ollama
    container_name: mestria-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mestria-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mestria-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
