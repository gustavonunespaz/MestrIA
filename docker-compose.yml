services:
  postgres:
    image: postgres:16-alpine
    container_name: mestria-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mestria
      POSTGRES_DB: mestria
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mestria-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:20
    container_name: mestria-api
    working_dir: /app/backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - mestria-network
    volumes:
      - .:/app
    command: "sh -c \"npx prisma migrate deploy && npm run dev\""
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20
    container_name: mestria-frontend
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3000/api"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mestria-network
    volumes:
      - .:/app
    command: "npm run dev -- --host 0.0.0.0 --port 5173"

  ollama:
    image: ollama/ollama
    container_name: mestria-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - mestria-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODEL=llama3.2:1b
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-init:
    image: ollama/ollama
    container_name: mestria-ollama-init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull llama3.2:1b"
    restart: "no"

networks:
  mestria-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
